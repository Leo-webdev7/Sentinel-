[build]
  command = "npm run build"
  publish = "dist"

# Proxy Mapbox API requests
[[redirects]]
  from = "/api/mapbox/*"
  to = "https://api.mapbox.com/:splat"
  status = 200
  force = true

# Edge functions
[[edge_functions]]
  function = "firms-proxy"
  path = "/api/firms/*"

[[edge_functions]]
  function = "fema-proxy"
  path = "/api/fema"

# ✅ HOME REDIRECT (MUST be above fallback)
[[redirects]]
  from = "/"
  to = "/sentinel"
  status = 302
  force = true

# SPA fallback – must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
