[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"

# Production branch
[context.production]
  branch = "Main"

# Stage branch preview deployment
[context.deploy-preview]
  branch = "stage"

# Dev branch deployment
[context.branch-deploy]
  branch = "dev"

# Proxy Mapbox API requests
[[redirects]]
  from = "/api/mapbox/*"
  to = "https://api.mapbox.com/:splat"
  status = 200
  force = true

# Edge functions
[[edge_functions]]
  function = "nhc-proxy"
  path = "/api/nhc/*"

[[edge_functions]]
  function = "firms-proxy"
  path = "/api/firms/*"

[[edge_functions]]
  function = "fema-proxy"
  path = "/api/fema"

[[edge_functions]]
  function = "calfire-proxy"
  path = "/api/calfire"

[[edge_functions]]
  function = "census-counties-proxy"
  path = "/api/census/counties"

[[edge_functions]]
  function = "nwps-proxy"
  path = "/api/nwps/*"

# ✅ HOME REDIRECT (MUST be above fallback)
[[redirects]]
  from = "/"
  to = "/sentinel"
  status = 302
  force = true

# SPA fallback – must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
