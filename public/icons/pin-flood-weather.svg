<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80" width="60" height="80">
  <defs>
    <clipPath id="pin-fw">
      <path d="M30 2C14.5 2 2 14.5 2 30c0 17.5 28 48 28 48s28-30.5 28-48C58 14.5 45.5 2 30 2z"/>
    </clipPath>
    <linearGradient id="fw-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#041528"/>
      <stop offset="100%" stop-color="#092250"/>
    </linearGradient>
    <radialGradient id="fw-glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Outer glow -->
  <ellipse cx="30" cy="34" rx="33" ry="36" fill="url(#fw-glow)"/>
  <g clip-path="url(#pin-fw)">
    <!-- Sky background -->
    <rect width="60" height="80" fill="url(#fw-sky)"/>
    <!-- Cloud shadow -->
    <ellipse cx="30" cy="28" rx="19" ry="9" fill="#102848" opacity=".7"/>
    <!-- Cloud left lobe -->
    <ellipse cx="20" cy="29" rx="10" ry="8" fill="#3d5f8a"/>
    <!-- Cloud right lobe -->
    <ellipse cx="40" cy="29" rx="10" ry="8" fill="#3d5f8a"/>
    <!-- Cloud top dome -->
    <ellipse cx="30" cy="23" rx="14" ry="9" fill="#4a70a0"/>
    <!-- Cloud base -->
    <rect x="10" y="28" width="40" height="8" rx="4" fill="#5078aa"/>
    <!-- Rain drops -->
    <line x1="18" y1="40" x2="16" y2="47" stroke="#6699cc" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="24" y1="42" x2="22" y2="49" stroke="#6699cc" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="30" y1="41" x2="28" y2="48" stroke="#6699cc" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="36" y1="40" x2="34" y2="47" stroke="#6699cc" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="42" y1="42" x2="40" y2="49" stroke="#6699cc" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Water base -->
    <rect y="55" width="60" height="25" fill="#082258"/>
    <!-- Wave 1 -->
    <path d="M0 55 C8 50 18 60 30 55 C42 50 52 60 60 55 L60 80 L0 80Z" fill="#0e3a90"/>
    <!-- Wave 2 -->
    <path d="M0 63 C8 58 18 68 30 63 C42 58 52 68 60 63 L60 80 L0 80Z" fill="#0a2878"/>
    <!-- Wave 3 -->
    <path d="M0 71 C8 66 18 76 30 71 C42 66 52 76 60 71 L60 80 L0 80Z" fill="#061860"/>
  </g>
  <!-- Cyan border -->
  <path d="M30 2C14.5 2 2 14.5 2 30c0 17.5 28 48 28 48s28-30.5 28-48C58 14.5 45.5 2 30 2z" fill="none" stroke="#00d9d9" stroke-width="2.5"/>
  <!-- Inner glow stroke -->
  <path d="M30 2C14.5 2 2 14.5 2 30c0 17.5 28 48 28 48s28-30.5 28-48C58 14.5 45.5 2 30 2z" fill="none" stroke="#00d9d9" stroke-width="7" stroke-opacity="0.18" clip-path="url(#pin-fw)"/>
</svg>
