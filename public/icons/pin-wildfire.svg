<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80" width="60" height="80">
  <defs>
    <clipPath id="pin-wf">
      <path d="M30 2C14.5 2 2 14.5 2 30c0 17.5 28 48 28 48s28-30.5 28-48C58 14.5 45.5 2 30 2z"/>
    </clipPath>
    <radialGradient id="wf-bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#3d1000"/>
      <stop offset="100%" stop-color="#0d0300"/>
    </radialGradient>
    <radialGradient id="wf-glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Outer glow -->
  <ellipse cx="30" cy="34" rx="33" ry="36" fill="url(#wf-glow)"/>
  <g clip-path="url(#pin-wf)">
    <!-- Background -->
    <rect width="60" height="80" fill="url(#wf-bg)"/>
    <!-- Dark ground -->
    <rect y="52" width="60" height="28" fill="#080200"/>
    <!-- Tree trunks -->
    <rect x="5"  y="44" width="3"   height="16" fill="#040100"/>
    <rect x="12" y="47" width="2.5" height="13" fill="#040100"/>
    <rect x="19" y="46" width="2"   height="14" fill="#040100"/>
    <rect x="39" y="46" width="2"   height="14" fill="#040100"/>
    <rect x="46" y="47" width="2.5" height="13" fill="#040100"/>
    <rect x="52" y="44" width="3"   height="16" fill="#040100"/>
    <!-- Flame outer (deep red) -->
    <path d="M30 13c-4 7-13 11-11 25 1.5 8 6 13 11 15 5-2 9.5-7 11-15 2-14-7-18-11-25z" fill="#a81500"/>
    <!-- Flame mid (orange-red) -->
    <path d="M30 18c-3 6-9 10-7 21 1 6 4 10 7 12 3-2 6-6 7-12 2-11-4-15-7-21z" fill="#e83000"/>
    <!-- Flame bright (orange) -->
    <path d="M30 23c-2.5 5-6 8-5 17 .5 4.5 2 7.5 5 9 3-1.5 4.5-4.5 5-9 1-9-2.5-12-5-17z" fill="#ff6600"/>
    <!-- Flame inner (amber) -->
    <path d="M30 29c-1.5 3.5-3.5 6-3 12 .5 3 1.5 5 3 6 1.5-1 2.5-3 3-6 .5-6-1.5-8.5-3-12z" fill="#ffaa00"/>
    <!-- Flame core (yellow) -->
    <path d="M30 35c-1 2.5-2 4.5-1.5 8L30 45l1.5-2c.5-3.5-.5-5.5-1.5-8z" fill="#ffe066"/>
    <!-- Bright tip -->
    <path d="M30 38c-.8 2-.8 3.5-.3 5.5L30 45l.3-1.5c.5-2 .5-3.5-.3-5.5z" fill="#fffde7" opacity=".75"/>
  </g>
  <!-- Cyan border -->
  <path d="M30 2C14.5 2 2 14.5 2 30c0 17.5 28 48 28 48s28-30.5 28-48C58 14.5 45.5 2 30 2z" fill="none" stroke="#00d9d9" stroke-width="2.5"/>
  <!-- Inner glow stroke -->
  <path d="M30 2C14.5 2 2 14.5 2 30c0 17.5 28 48 28 48s28-30.5 28-48C58 14.5 45.5 2 30 2z" fill="none" stroke="#00d9d9" stroke-width="7" stroke-opacity="0.18" clip-path="url(#pin-wf)"/>
</svg>
